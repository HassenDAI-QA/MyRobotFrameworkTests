name: Greetings

on: [pull_request_target, issues, workflow_dispatch ]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Message that will be displayed on users' first issue by HASSEN DAI"
        pr-message: "Message that will be displayed on users' first pull request by HASSEN DAI"
        
    - name: Manual trigger message
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "Workflow manually triggered by HASSEN DAI"
